<div id="app-content">
<script>
(function(){
    if (!document.querySelector('link[href="/static/css/game.css"]')) {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = '/static/css/game.css';
        document.head.appendChild(link);
    }
})();
</script>
<div class="game-container">
    <div class="background-layer">
        <div class="scene-background" id="sceneBgA"></div>
        <div class="scene-background" id="sceneBgB"></div>
    </div>

    <div class="portrait-layer">
        <img id="portraitImg" alt="">
    </div>

    <div class="dialogue-layer">
        <div class="dialogue-body">
            <div class="dialogue-header">
                <div class="brown-bar"></div>
                <div class="hexagon-nameplate">
                    <span id="hexagonSpeaker">白沙手记</span>
                </div>
            </div>

            <div class="dialogue-text" id="dialogueText"></div>

            <div class="continue-area" id="continueArea" style="display:none;">
                <button class="continue-btn" id="continueBtn">▼ 继续 (Space / →)</button>
            </div>

            <div class="choices-area" id="choicesArea" style="display:none;"></div>

            <div class="hint" id="hint">↑↓←→ 选择 ・ Space / Enter 确认</div>
        </div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" onclick="resetGame()">🔄 重来</button>
    </div>

    {% if debug_mode %}
    <div class="debug-panel" id="debugPanel">
        <h4>
            <span>🔍 DEBUG</span>
            <button class="toggle-collapse" id="dbgToggle">[折叠]</button>
        </h4>
        <div class="body">
            <div class="row"><span>当前节点:</span><span id="dbgNode">-</span></div>
            <div class="row"><span>说话人:</span><span id="dbgSpeaker">-</span></div>
            <div class="row"><span>模式:</span><span id="dbgMode">-</span></div>
            <div class="row"><span>下一节点:</span><span id="dbgNext">-</span></div>
            <div class="row"><span>选项数:</span><span id="dbgChoices">0</span></div>
            <div class="row"><span>解谜标记:</span><span id="dbgPuzzle">-</span></div>
            <div style="margin-top:8px">最近路径:</div>
            <div class="history" id="dbgHistory"></div>
            <div style="margin-top:8px">跳转到节点:</div>
            <select id="dbgJumpSelect"><option value="">-- 加载中 --</option></select>
            <button class="dbg-btn" id="dbgJumpBtn">→ 跳转</button>
            <button class="dbg-btn" id="dbgRefresh">↻ 重读当前节点</button>
        </div>
    </div>
    {% else %}
    <button class="player-menu-btn" id="playerMenuBtn" title="菜单">☰</button>
    <div class="player-panel-overlay" id="playerPanelOverlay">
        <div class="player-panel">
            <div class="player-panel-header">
                <h3>☰ 白沙尘烟</h3>
                <button class="player-panel-close" id="playerPanelClose">✕</button>
            </div>
            <div class="player-tabs">
                <button class="player-tab active" data-tab="chapters">章节</button>
                <button class="player-tab" data-tab="saves">存档</button>
                <button class="player-tab" data-tab="history">回看</button>
                <button class="player-tab" data-tab="replay">重播</button>
            </div>
            <div class="player-tab-content" id="playerTabContent"></div>
        </div>
    </div>
    {% endif %}

    <!-- 章节标题屏 -->
    <div id="chapterOverlay" class="chapter-overlay">
        <div class="chapter-bg" id="chapterBg"></div>
        <div class="chapter-content">
            <div class="chapter-number" id="chapterNumber"></div>
            <div class="chapter-title" id="chapterTitle"></div>
        </div>
    </div>
</div>

<script>
const DEBUG_MODE = {{ debug_mode|lower }};

let pendingNext = null;
let pendingChoices = null;
let focusIndex = 0; // 当前键盘焦点索引（用于 choices）
let mode = 'idle';  // 'continue' | 'choices' | 'idle'
let dbgHistory = [];
let dbgCurrent = {id:'-', speaker:'-', next:'-', choices:0, puzzle:'-'};
let historyStack = []; // 对话历史栈（用于左箭头回退）
let currentNodeId = 'start';
let isGoingBack = false; // Flag for back navigation

// ========== 玩家菜单 localStorage 辅助 ==========
function getPlayerData(key, defaultVal) {
    try { return JSON.parse(localStorage.getItem(key)) || defaultVal; }
    catch { return defaultVal; }
}
function setPlayerData(key, val) {
    localStorage.setItem(key, JSON.stringify(val));
}

// ========== 章节标题屏 ==========
let currentChapter = null;
let chaptersData = [];

async function loadChapters() {
    try {
        const r = await fetch('/api/chapters');
        const data = await r.json();
        chaptersData = data.chapters || [];
    } catch (e) {
        console.error('Failed to load chapters:', e);
    }
}

function getChapterDisplayInfo(chapterId) {
    const ch = chaptersData.find(c => c.id === chapterId);
    if (!ch) return null;
    
    // 特殊处理：楔子、终章、封存不显示序号
    const specialChapters = ['prologue', 'finale', 'closure'];
    const isSpecial = specialChapters.includes(chapterId);
    
    return {
        number: isSpecial ? '' : `第${ch.number}章`,
        title: ch.title,
        background_image: ch.background_image
    };
}

function showChapterOverlay(chapterId) {
    const info = getChapterDisplayInfo(chapterId);
    if (!info) return Promise.resolve();
    
    return new Promise((resolve) => {
        const overlay = document.getElementById('chapterOverlay');
        const bg = document.getElementById('chapterBg');
        const numberEl = document.getElementById('chapterNumber');
        const titleEl = document.getElementById('chapterTitle');
        
        // 设置内容
        numberEl.textContent = info.number;
        titleEl.textContent = info.title;
        if (info.background_image) {
            bg.style.backgroundImage = `url('/${info.background_image.replace(/^\/?/, '')}')`;
        }
        
        // 淡入
        overlay.classList.add('visible');
        
        // 停留2秒后淡出
        setTimeout(() => {
            overlay.classList.remove('visible');
            setTimeout(resolve, 800); // 等待淡出动画完成
        }, 2000);
    });
}

function updateHexagon(speaker) {
    document.getElementById('hexagonSpeaker').textContent = speaker || '白沙手记';
}

let activeBg = 'A';
function setBackground(img, position) {
    if (!img) return;
    const url = `/${img.replace(/^\/?/, '')}`;
    const fromId = activeBg === 'A' ? 'sceneBgA' : 'sceneBgB';
    const toId = activeBg === 'A' ? 'sceneBgB' : 'sceneBgA';
    const from = document.getElementById(fromId);
    const to = document.getElementById(toId);
    const preload = new Image();
    preload.onload = () => {
        to.style.backgroundImage = `url('${url}')`;
        to.style.backgroundPosition = position || 'center';
        to.style.opacity = '1';
        from.style.opacity = '0';
        activeBg = activeBg === 'A' ? 'B' : 'A';
    };
    preload.src = url;
}

function setPortrait(img, position) {
    const el = document.getElementById('portraitImg');
    const layer = document.querySelector('.portrait-layer');
    layer.classList.remove('pos-left', 'pos-center', 'pos-right');
    if (img && position) {
        el.src = `/${img.replace(/^\/?/, '')}`;
        el.classList.add('visible');
        layer.classList.add('pos-' + position);
    } else {
        el.classList.remove('visible');
        el.removeAttribute('src');
    }
}

function renderChoices() {
    const div = document.getElementById('choicesArea');
    div.style.display = 'flex';
    div.innerHTML = pendingChoices.map((c, i) =>
        `<button class="choice-btn" data-idx="${i}" onclick="pickChoice(${i})">${c.text}</button>`
    ).join('');
    focusIndex = 0;
    refreshFocus();
}

function refreshFocus() {
    if (mode === 'choices') {
        document.querySelectorAll('.choice-btn').forEach((b, i) => {
            b.classList.toggle('focused', i === focusIndex);
            if (i === focusIndex) b.scrollIntoView({block: 'nearest'});
        });
    } else if (mode === 'continue') {
        document.getElementById('continueBtn').classList.add('focused');
    }
}

function pickChoice(i) {
    if (!pendingChoices || !pendingChoices[i]) return;
    const next = pendingChoices[i].next;
    pendingChoices = null;
    mode = 'idle';
    historyStack.push(currentNodeId);
    loadDialogue(next);
}

function onContinue() {
    if (mode === 'continue' && pendingChoices && pendingChoices.length > 0) {
        document.getElementById('continueArea').style.display = 'none';
        mode = 'choices';
        renderChoices();
    } else if (mode === 'continue' && pendingNext) {
        document.getElementById('continueArea').style.display = 'none';
        const n = pendingNext;
        pendingNext = null;
        mode = 'idle';
        historyStack.push(currentNodeId);
        loadDialogue(n);
    }
}

async function loadDialogue(choiceNext = null) {
    document.getElementById('choicesArea').style.display = 'none';
    document.getElementById('choicesArea').innerHTML = '';
    document.getElementById('continueArea').style.display = 'none';
    mode = 'idle';

    try {
        const r = await fetch('/api/dialogue', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({choice_next: choiceNext})
        });
        const data = await r.json();

        // 调试信息
        dbgCurrent = {
            id: data.id || '?',
            speaker: data.speaker || '?',
            next: data.next || '(无)',
            choices: (data.choices || []).length,
            puzzle: data.puzzle || '(无)'
        };
        if (dbgHistory[dbgHistory.length-1] !== data.id) {
            dbgHistory.push(data.id);
            if (dbgHistory.length > 20) dbgHistory.shift();
        }
        if (DEBUG_MODE) refreshDebug();

        // 记录当前节点
        currentNodeId = data.id;

        // 追踪已访问章节
        if (data.chapter_id) {
            let visited = getPlayerData('visited_chapters', []);
            if (!visited.includes(data.chapter_id)) {
                visited.push(data.chapter_id);
                setPlayerData('visited_chapters', visited);
            }
        }
        // 追踪剧情历史
        let storyHistory = getPlayerData('story_history', []);
        if (storyHistory[storyHistory.length-1] !== data.id) {
            storyHistory.push(data.id);
            if (storyHistory.length > 100) storyHistory.shift();
            setPlayerData('story_history', storyHistory);
        }

        // 检测章节变化
        const newChapter = data.chapter_id;
        if (newChapter && newChapter !== currentChapter) {
            currentChapter = newChapter;
            // 显示章节标题屏（非阻塞），回退时不显示
            if (!isGoingBack) {
                showChapterOverlay(newChapter);
            }
        }
        isGoingBack = false;

        // 立即整段显示（分段首行缩进，段间无空行）
        const paragraphs = data.text.split('\n\n')
            .map(p => p.replace(/\n/g, '<br>'))
            .filter(p => p.trim() !== '');
        document.getElementById('dialogueText').innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');
        updateHexagon(data.speaker);
        if (data.background_image) setBackground(data.background_image, data.background_position);
        setPortrait(data.portrait, data.portrait_position);

        if (data.choices && data.choices.length > 0) {
            pendingChoices = data.choices;
            pendingNext = null;
            // 跳过继续按钮，直接显示选项（更顺手）
            mode = 'choices';
            renderChoices();
        } else if (data.next === 'game_end') {
            setTimeout(() => {
                if (confirm('✨ 一段尘封的历史被揭开……\n\n点击确定重新开始')) resetGame();
            }, 400);
        } else if (data.next === 'game_over') {
            setTimeout(() => {
                if (confirm('💀 故事未尽……\n\n点击确定重来')) resetGame();
            }, 400);
        } else if (data.next) {
            pendingNext = data.next;
            document.getElementById('continueArea').style.display = 'flex';
            mode = 'continue';
            refreshFocus();
        }
        if (DEBUG_MODE) refreshDebug();
    } catch (e) {
        console.error(e);
        document.getElementById('dialogueText').innerHTML = '<p>岁月模糊了字迹，请刷新重试……</p>';
    }
}

async function resetGame() {
    if (!confirm('确定要重翻旧卷吗？当前进度将会遗失。')) return;
    await fetch('/api/reset', {method: 'POST'});
    document.getElementById('sceneBgA').style.backgroundImage = '';
    document.getElementById('sceneBgB').style.backgroundImage = '';
    document.getElementById('sceneBgA').style.opacity = '1';
    document.getElementById('sceneBgB').style.opacity = '0';
    activeBg = 'A';
    loadDialogue('start');
}

// ========== 键盘控制 ==========
function goBack() {
    if (historyStack.length === 0) return;
    const prevId = historyStack.pop();
    isGoingBack = true;
    loadDialogue(prevId);
}

document.addEventListener('keydown', (e) => {
    const k = e.key;

    if (mode === 'continue') {
        if (k === 'ArrowLeft') {
            e.preventDefault();
            goBack();
        } else if (k === ' ' || k === 'Enter' || k === 'ArrowRight' || k === 'ArrowDown') {
            e.preventDefault();
            onContinue();
        }
    } else if (mode === 'choices') {
        if (k === 'ArrowDown' || k === 'ArrowRight') {
            e.preventDefault();
            focusIndex = (focusIndex + 1) % pendingChoices.length;
            refreshFocus();
        } else if (k === 'ArrowUp' || k === 'ArrowLeft') {
            e.preventDefault();
            focusIndex = (focusIndex - 1 + pendingChoices.length) % pendingChoices.length;
            refreshFocus();
        } else if (k === ' ' || k === 'Enter') {
            e.preventDefault();
            pickChoice(focusIndex);
        } else if (/^[1-9]$/.test(k)) {
            const i = parseInt(k) - 1;
            if (i < pendingChoices.length) {
                e.preventDefault();
                pickChoice(i);
            }
        }
    }
});

document.getElementById('continueBtn').addEventListener('click', onContinue);

// ========== 调试面板 ==========
function refreshDebug() {
    document.getElementById('dbgNode').textContent = dbgCurrent.id;
    document.getElementById('dbgSpeaker').textContent = dbgCurrent.speaker;
    document.getElementById('dbgMode').textContent = mode;
    document.getElementById('dbgNext').textContent = dbgCurrent.next;
    document.getElementById('dbgChoices').textContent = dbgCurrent.choices;
    const pz = document.getElementById('dbgPuzzle');
    pz.textContent = dbgCurrent.puzzle;
    pz.className = (dbgCurrent.puzzle && dbgCurrent.puzzle !== '(无)') ? 'ok' : '';
    const hist = document.getElementById('dbgHistory');
    hist.innerHTML = dbgHistory.map((h,i) =>
        `<div>${i === dbgHistory.length-1 ? '▶' : '·'} ${h}</div>`
    ).join('');
    hist.scrollTop = hist.scrollHeight;
}

async function loadJumpList() {
    try {
        const r = await fetch('/api/dialogue/list');
        const data = await r.json();
        const sel = document.getElementById('dbgJumpSelect');
        sel.innerHTML = data.nodes.map(n => {
            const tag = n.puzzle ? ' 🧭' : (n.has_choices ? ' ❖' : '');
            return `<option value="${n.id}">${n.id}${tag} · ${n.speaker} · ${n.preview}</option>`;
        }).join('');
        sel.value = data.current;
    } catch (e) { console.error(e); }
}

if (DEBUG_MODE) {
    document.getElementById('dbgJumpBtn').addEventListener('click', () => {
        const id = document.getElementById('dbgJumpSelect').value;
        if (id) loadDialogue(id);
    });
    document.getElementById('dbgRefresh').addEventListener('click', () => loadDialogue());
    document.getElementById('dbgToggle').addEventListener('click', () => {
        const p = document.getElementById('debugPanel');
        p.classList.toggle('collapsed');
        document.getElementById('dbgToggle').textContent =
            p.classList.contains('collapsed') ? '[展开]' : '[折叠]';
    });
    loadJumpList();
}

// ========== 玩家菜单 ==========
if (!DEBUG_MODE) {
    const overlay = document.getElementById('playerPanelOverlay');
    const closeBtn = document.getElementById('playerPanelClose');
    const menuBtn = document.getElementById('playerMenuBtn');
    const tabs = document.querySelectorAll('.player-tab');
    const content = document.getElementById('playerTabContent');
    let activeTab = 'chapters';

    function openPanel() { overlay.classList.add('visible'); renderTab(activeTab); }
    function closePanel() { overlay.classList.remove('visible'); }

    menuBtn.addEventListener('click', openPanel);
    closeBtn.addEventListener('click', closePanel);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closePanel(); });

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            activeTab = tab.dataset.tab;
            renderTab(activeTab);
        });
    });

    function renderTab(name) {
        if (name === 'chapters') renderChapterTab();
        else if (name === 'saves') renderSavesTab();
        else if (name === 'history') renderHistoryTab();
        else if (name === 'replay') renderReplayTab();
    }

    function renderChapterTab() {
        const visited = getPlayerData('visited_chapters', []);
        const html = chaptersData.map(ch => {
            const locked = !visited.includes(ch.id);
            const specialChapters = ['prologue', 'finale', 'closure'];
            const isSpecial = specialChapters.includes(ch.id);
            const label = isSpecial ? ch.title : `第${ch.number}章 · ${ch.title}`;
            return `<div class="chapter-list-item ${locked ? 'locked' : ''}"
                         ${locked ? '' : `onclick="jumpToChapter('${ch.id}')"`}>
                <span class="ch-icon">${locked ? '○' : '◆'}</span>
                <span class="ch-title">${label}</span>
            </div>`;
        }).join('');
        content.innerHTML = html || '<div class="player-empty">暂无章节数据</div>';
    }

    function jumpToChapter(chapterId) {
        const ch = chaptersData.find(c => c.id === chapterId);
        if (!ch || !ch.start_node) return;
        closePanel();
        historyStack.push(currentNodeId);
        loadDialogue(ch.start_node);
    }

    function renderSavesTab() {
        const slots = [1, 2, 3];
        const html = slots.map(id => {
            const data = getPlayerData(`save_slot_${id}`, null);
            if (data) {
                return `<div class="save-slot">
                    <div class="save-slot-title">槽位 ${id}：${data.chapter_name}</div>
                    <div class="save-slot-info">进度：${data.node_id} · ${data.timestamp}</div>
                    <div class="save-slot-btns">
                        <button class="slot-btn" onclick="loadSaveSlot(${id})">读取</button>
                        <button class="slot-btn danger" onclick="deleteSaveSlot(${id})">删除</button>
                    </div>
                </div>`;
            } else {
                return `<div class="save-slot">
                    <div class="save-slot-title">槽位 ${id}：（空）</div>
                    <div class="save-slot-btns">
                        <button class="slot-btn" onclick="saveToSlot(${id})">保存</button>
                    </div>
                </div>`;
            }
        }).join('');
        content.innerHTML = html;
    }

    function saveToSlot(slotId) {
        const existing = getPlayerData(`save_slot_${slotId}`, null);
        if (existing && !confirm(`槽位 ${slotId} 已有存档，确定覆盖？`)) return;
        const ch = chaptersData.find(c => c.id === currentChapter);
        const saveData = {
            node_id: currentNodeId,
            chapter: currentChapter || '',
            chapter_name: ch ? ch.title : '未知',
            timestamp: new Date().toLocaleString('zh-CN'),
            visited_chapters: getPlayerData('visited_chapters', []),
            history: getPlayerData('story_history', [])
        };
        setPlayerData(`save_slot_${slotId}`, saveData);
        renderSavesTab();
    }

    function loadSaveSlot(slotId) {
        const data = getPlayerData(`save_slot_${slotId}`, null);
        if (!data) return;
        if (!confirm(`读取存档：${data.chapter_name} (${data.node_id})？`)) return;
        setPlayerData('visited_chapters', data.visited_chapters || []);
        setPlayerData('story_history', data.history || []);
        closePanel();
        loadDialogue(data.node_id);
    }

    function deleteSaveSlot(slotId) {
        if (!confirm('确定删除此存档？')) return;
        localStorage.removeItem(`save_slot_${slotId}`);
        renderSavesTab();
    }

    function renderHistoryTab() {
        const history = getPlayerData('story_history', []);
        if (history.length === 0) {
            content.innerHTML = '<div class="player-empty">暂无剧情记录</div>';
            return;
        }
        const reversed = [...history].reverse().slice(0, 50);
        const html = reversed.map((nodeId, i) => {
            const isCurrent = (i === 0);
            return `<div class="history-item ${isCurrent ? 'current' : ''}"
                         onclick="jumpToNode('${nodeId}')">
                <div class="history-dot"></div>
                <span>${nodeId}</span>
            </div>`;
        }).join('');
        content.innerHTML = html;
    }

    function jumpToNode(nodeId) {
        if (!confirm(`跳转到节点 ${nodeId}？`)) return;
        historyStack.push(currentNodeId);
        closePanel();
        loadDialogue(nodeId);
    }

    function renderReplayTab() {
        content.innerHTML = `<div class="replay-info">
            <p>重播当前场景</p>
            <p>当前节点：${currentNodeId}</p>
            <p>说话人：${document.getElementById('hexagonSpeaker').textContent}</p>
            <button class="replay-confirm" onclick="replayCurrent()">确认重播</button>
        </div>`;
    }

    function replayCurrent() {
        closePanel();
        loadDialogue();
    }
}

loadChapters().then(() => loadDialogue());
</script>
</div>
