<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{% block title %}白沙尘烟·考古剧情游戏{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "SimHei", "PingFang SC", "Noto Serif SC", "KaiTi", serif;
            background: linear-gradient(135deg, #d4c5a9 0%, #c4b896 50%, #b8a87a 100%);
            min-height: 100vh;
            color: #2c2418;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        /* 毛笔笔触标题 */
        .game-title {
            text-align: center;
            font-size: 42px;
            font-weight: normal;
            color: #5c3d1a;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            letter-spacing: 8px;
            margin-bottom: 20px;
            font-family: "STKaiti", "KaiTi", serif;
        }
        
        /* 宣纸风格卡片 */
        .paper-card {
            background: rgba(250, 245, 235, 0.92);
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            border: 1px solid #d4c5a9;
        }
        
        nav {
            background: rgba(60, 45, 30, 0.85);
            padding: 12px 25px;
            border-radius: 40px;
            margin-bottom: 25px;
            backdrop-filter: blur(5px);
            text-align: center;
        }
        
        nav a {
            color: #e8dcc8;
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
            transition: all 0.3s;
            font-family: "STKaiti", "KaiTi", serif;
        }
        
        nav a:hover {
            color: #d4a543;
            text-shadow: 0 0 8px rgba(212, 165, 67, 0.5);
        }
        
        .btn {
            background: linear-gradient(135deg, #8b6914, #6b4e14);
            color: #f5e6d3;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            font-family: "STKaiti", "KaiTi", serif;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #a07a1a, #7a5a1a);
            transform: scale(1.02);
            box-shadow: 0 3px 12px rgba(107, 78, 20, 0.4);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes typewriter {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .cursor-blink {
            animation: blink 1s infinite;
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #5c3d1a;
            margin-left: 2px;
            vertical-align: middle;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* 卷轴装饰 */
        .scroll-decoration {
            height: 4px;
            background: linear-gradient(90deg, transparent, #c4a562, #8b6914, #c4a562, transparent);
            margin: 10px 0;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #e8dcc8;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #8b6914;
            border-radius: 4px;
        }
        
        .archaeology-icon {
            font-size: 24px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <div class="game-title">
            <span class="archaeology-icon">🏺</span> 白沙尘烟 <span class="archaeology-icon">📜</span>
        </div>
        <div class="scroll-decoration"></div>
        <nav>
            <a href="javascript:void(0)" onclick="loadPage('index')">🏠 首页</a>
            <a href="javascript:void(0)" onclick="loadPage('game')">🎭 进入白沙</a>
        </nav>
        <div id="app-content">
            {% block content %}{% endblock %}
        </div>
    </div>
    <script src="/static/js/content-loader.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
