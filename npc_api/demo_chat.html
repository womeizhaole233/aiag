<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白沙宋墓 · 考古领队对话系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f1e9 0%, #e8e0d2 100%);
            min-height: 100vh;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            background: #fffdf9;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(100, 80, 60, 0.15);
            width: 100%;
            max-width: 700px;
            border: 1px solid #e0d5c5;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(90deg, #7a6a58 0%, #9b8b77 100%);
            color: #fff;
            padding: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .chat-header img.avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
        }

        .chat-header .header-text h1 {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .chat-header .header-text p {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .chat-messages {
            height: 350px;
            overflow-y: auto;
            padding: 20px;
            background: #faf7f2;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
        }

        .user-message {
            justify-content: flex-end;
        }

        .npc-message {
            justify-content: flex-start;
        }

        .message .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #d4c7b0;
            object-fit: cover;
            flex-shrink: 0;
        }

        .user-message .avatar {
            order: 1;
            display: none; /* 这里只给领队显示头像 */
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 15px;
        }

        .user-message .message-bubble {
            background: #d4c7b0;
            color: #3a3229;
        }

        .npc-message .message-bubble {
            background: #e8e0d2;
            color: #3a3229;
            border: 1px solid #d4c7b0;
        }

        .chat-controls {
            padding: 20px;
            border-top: 1px solid #e0d5c5;
        }

        .chapter-select {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chapter-select label {
            color: #7a6a58;
            font-size: 14px;
            font-weight: 500;
        }

        .chapter-select select {
            padding: 8px 12px;
            border: 1px solid #d4c7b0;
            border-radius: 8px;
            background: #fff;
            color: #3a3229;
            font-size: 14px;
            outline: none;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        #question-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d4c7b0;
            border-radius: 10px;
            font-size: 15px;
            background: #fff;
            outline: none;
            transition: border-color 0.3s;
        }

        #question-input:focus {
            border-color: #9b8b77;
        }

        #send-btn {
            padding: 12px 24px;
            background: linear-gradient(90deg, #7a6a58 0%, #9b8b77 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        #send-btn:hover {
            opacity: 0.9;
        }

        #send-btn:active {
            transform: scale(0.98);
        }

        /* 滚动条美化 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #faf7f2;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #d4c7b0;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <!-- 这里加了领队头像 -->
            <img src="avatar.png" alt="领队头像" class="avatar">
            <div class="header-text">
                <h1>白沙宋墓 · 考古领队对话系统</h1>
                <p>与资深考古学者的现场交流</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message npc-message">
                <img src="avatar.png" alt="领队头像" class="avatar">
                <div class="message-bubble">
                    你好，我是本次考古项目的领队。请先观察现场，再提出你的问题。
                </div>
            </div>
        </div>

        <div class="chat-controls">
            <div class="chapter-select">
                <label for="chapter-select">当前章节：</label>
                <select id="chapter-select">
                    <option value="墓门">墓门</option>
                    <option value="甬道">甬道</option>
                    <option value="前室">前室</option>
                    <option value="过道">过道</option>
                    <option value="后室">后室</option>
                </select>
            </div>

            <div class="input-area">
                <input type="text" id="question-input" placeholder="输入你的问题...">
                <button id="send-btn">发送提问</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chapterSelect = document.getElementById('chapter-select');
        const questionInput = document.getElementById('question-input');
        const sendBtn = document.getElementById('send-btn');

        // 发送问题函数
        async function sendQuestion() {
            const question = questionInput.value.trim();
            const chapter = chapterSelect.value;

            if (!question) return;

            // 添加用户消息
            addMessage(question, 'user');
            questionInput.value = '';

            // 显示加载状态
            const loadingId = addMessage('...', 'npc');

            try {
                // 调用后端接口
                const response = await fetch("http://localhost:3000/api/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        currentChapter: chapter,
                        question: question
                    })
                });

                const data = await response.json();

                // 移除加载状态，添加NPC回复
                removeMessage(loadingId);
                addMessage(data.reply, 'npc');

            } catch (error) {
                removeMessage(loadingId);
                addMessage("暂时无法连接，请检查服务是否正常运行。", 'npc');
            }
        }

        // 添加消息到界面（带头像）
        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;

            let html = '';
            if (type === 'npc') {
                html = `
                    <img src="avatar.png" alt="领队头像" class="avatar">
                    <div class="message-bubble">${text}</div>
                `;
            } else {
                html = `
                    <div class="message-bubble">${text}</div>
                `;
            }

            messageDiv.innerHTML = html;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageDiv;
        }

        // 移除消息（用于加载状态）
        function removeMessage(element) {
            if (element && element.parentNode) {
                element.parentNode.removeChild(element);
            }
        }

        // 绑定事件
        sendBtn.addEventListener('click', sendQuestion);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuestion();
        });
    </script>
</body>
</html>
