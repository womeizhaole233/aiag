<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白沙宋墓 · 考古领队对话系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f1e9 0%, #e8e0d2 100%);
            min-height: 100vh;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .back-link {
            position: fixed;
            top: 18px;
            left: 18px;
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            padding: 0 14px;
            border: 1px solid #d4c7b0;
            border-radius: 999px;
            background: rgba(255, 253, 249, 0.88);
            color: #5f5142;
            text-decoration: none;
            box-shadow: 0 6px 18px rgba(100, 80, 60, 0.12);
        }

        .back-link:hover {
            background: #fffdf9;
        }

        .chat-container {
            background: #fffdf9;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(100, 80, 60, 0.15);
            width: 100%;
            max-width: 700px;
            border: 1px solid #e0d5c5;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(90deg, #7a6a58 0%, #9b8b77 100%);
            color: #fff;
            padding: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .chat-header img.avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
        }

        .chat-header .header-text h1 {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .chat-header .header-text p {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .chat-messages {
            height: 350px;
            overflow-y: auto;
            padding: 20px;
            background: #faf7f2;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
        }

        .user-message {
            justify-content: flex-end;
        }

        .npc-message {
            justify-content: flex-start;
        }

        .message .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #d4c7b0;
            object-fit: cover;
            flex-shrink: 0;
        }

        .user-message .avatar {
            order: 1;
            display: none; /* 这里只给领队显示头像 */
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 15px;
        }

        .user-message .message-bubble {
            background: #d4c7b0;
            color: #3a3229;
        }

        .npc-message .message-bubble {
            background: #e8e0d2;
            color: #3a3229;
            border: 1px solid #d4c7b0;
        }

        .chat-controls {
            padding: 20px;
            border-top: 1px solid #e0d5c5;
        }

        .chapter-select {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chapter-select label {
            color: #7a6a58;
            font-size: 14px;
            font-weight: 500;
        }

        .chapter-select select {
            padding: 8px 12px;
            border: 1px solid #d4c7b0;
            border-radius: 8px;
            background: #fff;
            color: #3a3229;
            font-size: 14px;
            outline: none;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        #question-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d4c7b0;
            border-radius: 10px;
            font-size: 15px;
            background: #fff;
            outline: none;
            transition: border-color 0.3s;
        }

        #question-input:focus {
            border-color: #9b8b77;
        }

        #send-btn {
            padding: 12px 24px;
            background: linear-gradient(90deg, #7a6a58 0%, #9b8b77 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        #send-btn:hover {
            opacity: 0.9;
        }

        #send-btn:active {
            transform: scale(0.98);
        }

        /* 滚动条美化 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #faf7f2;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #d4c7b0;
            border-radius: 3px;
        }

        /* 主线统一视觉：底图 + 暗色玻璃面板 */
        :root {
            --bg: #0c1118;
            --panel: rgba(20, 28, 39, 0.58);
            --panel-strong: rgba(17, 24, 39, 0.82);
            --panel-muted: rgba(244, 247, 252, 0.12);
            --border: rgba(255, 255, 255, 0.16);
            --border-strong: rgba(255, 255, 255, 0.24);
            --text: #edf2f7;
            --text-muted: rgba(226, 232, 240, 0.82);
            --text-faint: rgba(226, 232, 240, 0.58);
            --primary: #78a8ff;
            --primary-strong: #5b92ff;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        html,
        body {
            min-height: 100%;
            overflow-x: hidden;
        }

        body {
            color: var(--text);
            background:
                linear-gradient(180deg, rgba(5, 10, 17, 0.26), rgba(5, 10, 17, 0.8)),
                url("../assets/M1/00_墓葬全景与结构图/一号墓平剖面图.png") center / cover no-repeat fixed,
                var(--bg);
            font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at center, transparent 38%, rgba(2, 8, 14, 0.38) 100%),
                rgba(2, 8, 14, 0.22);
            pointer-events: none;
        }

        .back-link {
            z-index: 2;
            min-height: 40px;
            padding: 0 14px;
            border: 1px solid var(--border-strong);
            border-radius: 999px;
            background: rgba(10, 15, 24, 0.58);
            color: var(--text);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(18px);
            transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
        }

        .back-link:hover {
            border-color: var(--primary);
            background: rgba(120, 168, 255, 0.16);
            transform: translateY(-1px);
        }

        .chat-container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            width: min(880px, calc(100vw - 32px));
            max-width: none;
            height: min(760px, calc(100dvh - 96px));
            border: 1px solid var(--border);
            border-radius: 8px;
            background:
                linear-gradient(180deg, rgba(17, 24, 39, 0.82), rgba(8, 13, 22, 0.9)),
                var(--panel-strong);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .chat-header {
            justify-content: flex-start;
            padding: 16px;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 15, 24, 0.42);
            color: var(--text);
            text-align: left;
        }

        .chat-header img.avatar {
            width: 52px;
            height: 52px;
            border: 1px solid rgba(120, 168, 255, 0.36);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
        }

        .chat-header .header-text h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 650;
            letter-spacing: 0;
            line-height: 1.25;
        }

        .chat-header .header-text p {
            color: var(--text-muted);
            opacity: 1;
        }

        .model-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            color: var(--text-faint);
            font-size: 12px;
            line-height: 1.4;
        }

        .model-status::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #a0aec0;
            box-shadow: 0 0 0 3px rgba(160, 174, 192, 0.12);
        }

        .model-status.is-ready::before {
            background: #68d391;
            box-shadow: 0 0 0 3px rgba(104, 211, 145, 0.16);
        }

        .model-status.is-error::before {
            background: #fc8181;
            box-shadow: 0 0 0 3px rgba(252, 129, 129, 0.16);
        }

        .chat-messages {
            height: auto;
            min-height: 0;
            background: rgba(10, 15, 24, 0.26);
        }

        .message {
            align-items: flex-start;
        }

        .message .avatar {
            border: 1px solid var(--border-strong);
        }

        .message-bubble {
            border: 1px solid var(--border);
            border-radius: 8px;
            line-height: 1.7;
            font-size: 15px;
        }

        .npc-message .message-bubble {
            background: rgba(244, 247, 252, 0.1);
            color: var(--text);
            border-color: var(--border);
        }

        .user-message .message-bubble {
            background: rgba(120, 168, 255, 0.18);
            color: var(--text);
            border-color: rgba(120, 168, 255, 0.34);
        }

        .message-content {
            display: grid;
            gap: 5px;
            max-width: 75%;
        }

        .message-content .message-bubble {
            max-width: none;
        }

        .message-meta {
            color: var(--text-faint);
            font-size: 11px;
            line-height: 1.35;
        }

        .npc-message .message-meta {
            padding-left: 2px;
        }

        .user-message .message-meta {
            text-align: right;
        }

        .chat-controls {
            display: grid;
            gap: 12px;
            padding: 16px;
            border-top: 1px solid var(--border);
            background: rgba(10, 15, 24, 0.42);
        }

        .chapter-select {
            margin: 0;
        }

        .chapter-select label {
            color: var(--text-muted);
            font-size: 13px;
        }

        .chapter-select select,
        #question-input {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(10, 15, 24, 0.58);
            color: var(--text);
            box-shadow: none;
        }

        .chapter-select select:focus,
        #question-input:focus {
            border-color: var(--primary);
        }

        .chapter-select select option {
            background: #111827;
            color: var(--text);
        }

        #question-input::placeholder {
            color: var(--text-faint);
        }

        #send-btn {
            min-height: 42px;
            border: 1px solid var(--primary);
            border-radius: 999px;
            background: var(--primary);
            color: #08111d;
            font-weight: 600;
            transition: background 160ms ease, transform 160ms ease;
        }

        #send-btn:hover {
            background: var(--primary-strong);
            opacity: 1;
            transform: translateY(-1px);
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(10, 15, 24, 0.24);
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(226, 232, 240, 0.32);
        }

        @media (max-width: 720px) {
            body {
                align-items: stretch;
                padding: 72px 10px 10px;
            }

            .back-link {
                top: 12px;
                left: 10px;
            }

            .chat-container {
                width: 100%;
                height: calc(100dvh - 82px);
            }

            .chat-header {
                padding: 12px;
            }

            .chat-header img.avatar {
                width: 44px;
                height: 44px;
            }

            .chat-header .header-text h1 {
                font-size: 18px;
            }

            .chat-messages,
            .chat-controls {
                padding: 12px;
            }

            .input-area,
            .chapter-select {
                align-items: stretch;
                flex-direction: column;
            }

            #send-btn {
                width: 100%;
            }

            .message-content {
                max-width: 86%;
            }
        }
    </style>
</head>
<body>
    <a class="back-link" href="../index.html">返回主线</a>

    <div class="chat-container">
        <div class="chat-header">
            <!-- 这里加了领队头像 -->
            <img src="avatar.png" alt="领队头像" class="avatar">
            <div class="header-text">
                <h1>白沙宋墓 · 考古领队对话系统</h1>
                <p>与资深考古学者的现场交流</p>
                <span id="modelStatus" class="model-status">大模型连接检测中</span>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message npc-message">
                <img src="avatar.png" alt="领队头像" class="avatar">
                <div class="message-bubble">
                    你好，我是本次考古项目的领队。请先观察现场，再提出你的问题。
                </div>
            </div>
        </div>

        <div class="chat-controls">
            <div class="chapter-select">
                <label for="chapter-select">当前章节：</label>
                <select id="chapter-select">
                    <option value="墓门">墓门</option>
                    <option value="甬道">甬道</option>
                    <option value="前室">前室</option>
                    <option value="过道">过道</option>
                    <option value="后室">后室</option>
                </select>
            </div>

            <div class="input-area">
                <input type="text" id="question-input" placeholder="输入你的问题...">
                <button id="send-btn">发送提问</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chapterSelect = document.getElementById('chapter-select');
        const questionInput = document.getElementById('question-input');
        const sendBtn = document.getElementById('send-btn');
        const modelStatus = document.getElementById('modelStatus');
        const startupParams = new URLSearchParams(window.location.search);
        const startupChapter = startupParams.get('chapter');
        const activeNpcId = startupParams.get('npcId') || 'leader_01';
        const conversationHistory = [];
        const MAX_HISTORY_TURNS = 8;
        if (startupChapter && [...chapterSelect.options].some((option) => option.value === startupChapter)) {
            chapterSelect.value = startupChapter;
        }

        function setModelStatus(text, state = '') {
            modelStatus.textContent = text;
            modelStatus.classList.toggle('is-ready', state === 'ready');
            modelStatus.classList.toggle('is-error', state === 'error');
        }

        function rememberTurn(role, content) {
            conversationHistory.push({ role, content });
            while (conversationHistory.length > MAX_HISTORY_TURNS) {
                conversationHistory.shift();
            }
        }

        function formatModelMeta(data) {
            const tokens = data.usage?.total_tokens ? ` · ${data.usage.total_tokens} tokens` : '';
            const responseId = data.modelResponseId ? ` · ${data.modelResponseId}` : '';
            const skillFiles = Array.isArray(data.referencedKnowledgeFiles) && data.referencedKnowledgeFiles.length
                ? ` · 技能库 ${new Set(data.referencedKnowledgeFiles).size}`
                : '';
            const mode = data.mode ? ` · ${data.mode}` : '';
            return `大模型响应 · ${data.model || 'model'}${mode}${skillFiles}${tokens}${responseId}`;
        }

        async function refreshModelStatus() {
            try {
                const response = await fetch('/api/npc/status');
                if (!response.ok) throw new Error(`status-${response.status}`);
                const data = await response.json();
                if (!data.forceModelCall || !data.hasApiKey) {
                    setModelStatus(`大模型未配置 · ${data.model || 'model'}`, 'error');
                    return;
                }
                setModelStatus(`大模型已配置 · ${data.model} · ${data.apiHost}`, 'ready');
            } catch (error) {
                setModelStatus(`大模型状态不可用 · ${error.message}`, 'error');
            }
        }

        // 发送问题函数
        async function sendQuestion() {
            const question = questionInput.value.trim();
            const chapter = chapterSelect.value;

            if (!question) return;
            sendBtn.disabled = true;
            sendBtn.textContent = '模型思考中';

            // 添加用户消息
            addMessage(question, 'user');
            questionInput.value = '';

            // 显示加载状态
            const loadingId = addMessage('...', 'npc');

            try {
                const canUseLocalApi = ["localhost", "127.0.0.1", ""].includes(window.location.hostname);
                if (!canUseLocalApi) {
                    throw new Error("请通过本地开发服务打开主线，再进入队长对话。");
                }

                // 调用后端接口
                const response = await fetch("/api/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        npcId: activeNpcId,
                        currentChapter: chapter,
                        question: question,
                        history: conversationHistory.slice(-MAX_HISTORY_TURNS)
                    })
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.error || `api-${response.status}`);
                }

                if (!data.reply || data.source !== "llm" || !data.model) {
                    throw new Error(data.error || "api-not-llm");
                }

                // 移除加载状态，添加NPC回复
                removeMessage(loadingId);
                const npcMessage = addMessage(data.reply, 'npc');
                setMessageMeta(npcMessage, formatModelMeta(data));
                setModelStatus(`大模型已响应 · ${data.model}`, 'ready');
                rememberTurn('user', question);
                rememberTurn('assistant', data.reply);

            } catch (error) {
                removeMessage(loadingId);
                setModelStatus('大模型调用失败', 'error');
                addMessage(`大模型未连接：${error.message || "请检查 API 配置和网络后重试。"}`, 'npc');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送提问';
            }
        }

        // 添加消息到界面（带头像）
        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;

            let html = '';
            if (type === 'npc') {
                html = `
                    <img src="avatar.png" alt="领队头像" class="avatar">
                    <div class="message-content">
                        <div class="message-bubble"></div>
                        <div class="message-meta"></div>
                    </div>
                `;
            } else {
                html = `
                    <div class="message-content">
                        <div class="message-bubble"></div>
                        <div class="message-meta"></div>
                    </div>
                `;
            }

            messageDiv.innerHTML = html;
            messageDiv.querySelector('.message-bubble').textContent = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageDiv;
        }

        function setMessageMeta(messageElement, text) {
            const meta = messageElement?.querySelector('.message-meta');
            if (!meta) return;
            meta.textContent = text || '';
        }

        // 移除消息（用于加载状态）
        function removeMessage(element) {
            if (element && element.parentNode) {
                element.parentNode.removeChild(element);
            }
        }

        // 绑定事件
        sendBtn.addEventListener('click', sendQuestion);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuestion();
        });
        refreshModelStatus();
    </script>
</body>
</html>
