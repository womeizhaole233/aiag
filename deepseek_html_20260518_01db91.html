<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>古墓探秘 · 消消乐挖土</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a0f0a, #0a0502);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinema', 'Segoe UI', 'Georgia', 'Times New Roman', serif;
            margin: 0;
            padding: 20px;
        }

        /* 主游戏面板 - 古墓石椁风格 */
        .tomb-panel {
            width: 1500px;
            height: 900px;
            background: #2d1e12;
            background-image: repeating-linear-gradient(45deg, #3e2a1c22 0px, #3e2a1c22 2px, #2a1a0e22 2px, #2a1a0e22 8px);
            border-radius: 48px 28px 48px 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,215,150,0.2);
            border: 6px solid #a67c4b;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(0px);
        }

        /* 装饰性火把 / 符文 */
        .tomb-panel::before {
            content: "🔥";
            font-size: 48px;
            position: absolute;
            bottom: 20px;
            left: 20px;
            opacity: 0.5;
            text-shadow: 0 0 8px orange;
            pointer-events: none;
        }
        .tomb-panel::after {
            content: "🏺";
            font-size: 52px;
            position: absolute;
            top: 20px;
            right: 25px;
            opacity: 0.5;
            text-shadow: 0 0 6px gold;
            pointer-events: none;
            transform: rotate(10deg);
        }

        /* 主布局 flex */
        .game-layout {
            display: flex;
            height: 100%;
            width: 100%;
            padding: 28px 24px 28px 28px;
            gap: 30px;
        }

        /* 左侧消消乐区域 */
        .match-area {
            flex: 2.2;
            background: #1e130bb3;
            border-radius: 32px;
            padding: 12px;
            box-shadow: inset 0 0 20px #00000033, 0 10px 20px rgba(0,0,0,0.4);
            border: 1px solid #cb9e6b;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #201608;
            border-radius: 24px;
            box-shadow: 0 0 0 4px #735c3c, 0 0 0 8px #3e2a1a;
            cursor: pointer;
            margin: 0 auto;
        }

        /* 右侧 古墓祭坛风格 */
        .right-altar {
            flex: 1;
            background: #281e12e6;
            border-radius: 48px 28px 48px 28px;
            backdrop-filter: blur(1px);
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            box-shadow: inset 0 0 15px #d9a13b22, 0 8px 18px black;
            border-left: 3px solid #c29a6b;
            border-right: 3px solid #7a5a3a;
        }

        /* 文物剪影圣台 */
        .relic-shadow {
            background: #1f1408;
            border-radius: 60px 40px 60px 40px;
            padding: 15px 20px;
            text-align: center;
            width: 100%;
            box-shadow: inset 0 0 0 2px #dbb26b, 0 8px 12px black;
        }
        .relic-shadow p {
            margin: 0 0 8px 0;
            color: #f7e6c4;
            font-size: 18px;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0 #3a280e;
        }
        .shadow-icon {
            font-size: 80px;
            filter: drop-shadow(0 0 6px #e5b83c);
            background: #2f200e;
            border-radius: 50%;
            padding: 12px;
            display: inline-block;
        }

        /* 垂直土层进度条 (古墓岩层) */
        .soil-meter {
            width: 100%;
            background: #3e2a1a;
            border-radius: 80px;
            padding: 12px 10px;
            box-shadow: inset 0 0 8px #1a0f05, 0 4px 8px black;
        }
        .meter-label {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #ebcb9c;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .vertical-progress {
            background: #2b1d0e;
            height: 280px;
            width: 52px;
            margin: 0 auto;
            border-radius: 80px;
            position: relative;
            overflow: hidden;
            border: 3px solid #bc8f5a;
            box-shadow: inset 0 0 8px #00000066;
        }
        .progress-fill {
            background: linear-gradient(0deg, #9b6a3a, #dbb055);
            width: 100%;
            position: absolute;
            bottom: 0;
            height: 100%;
            transition: height 0.8s ease;
            border-radius: 30px;
            box-shadow: 0 0 10px #ffcf6e;
        }
        .percent-text {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
            color: #f7d98c;
            text-shadow: 2px 2px 0 #532e0e;
        }

        /* 古墓按钮 */
        .tomb-buttons {
            display: flex;
            gap: 25px;
            margin-top: 10px;
            width: 100%;
            justify-content: center;
        }
        .btn-tomb {
            background: #3d2a18;
            border: none;
            font-family: inherit;
            font-size: 20px;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            color: #ffefcf;
            text-shadow: 1px 1px 0 #482008;
            box-shadow: 0 5px 0 #221105;
            transition: 0.07s linear;
            cursor: pointer;
            letter-spacing: 2px;
            backdrop-filter: blur(2px);
        }
        .btn-tomb:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #221105;
        }
        .btn-tomb:hover {
            background: #5f3f22;
            color: #ffffd4;
        }

        /* 提示浮层 */
        .toast-msg {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            backdrop-filter: blur(8px);
            color: #ffdd99;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 20px;
            border-left: 6px solid #d6a447;
            font-weight: bold;
            pointer-events: none;
            z-index: 999;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="tomb-panel">
    <div class="game-layout">
        <!-- 消消乐画布区域 -->
        <div class="match-area">
            <canvas id="gameCanvas" width="1080" height="990"></canvas>
        </div>

        <!-- 右侧祭坛 -->
        <div class="right-altar">
            <div class="relic-shadow">
                <p>⚱️ 尘封圣物 ⚱️</p>
                <div class="shadow-icon">🏺</div>
                <div style="font-size: 14px; margin-top: 6px; color:#e7c487;">「古代祭祀罐」</div>
            </div>

            <div class="soil-meter">
                <div class="meter-label">
                    <span>⛏️ 剩余进度</span>
                    <span>⚡</span>
                </div>
                <div class="vertical-progress">
                    <div id="soilFill" class="progress-fill" style="height: 100%;"></div>
                </div>
                <div class="percent-text" id="soilPercent">100%</div>
            </div>

            <div class="tomb-buttons">
                <button class="btn-tomb" id="resetBtn">🪦 重置游戏</button>
                <button class="btn-tomb" id="exitBtn">🚪 退出游戏</button>
            </div>
            <div style="font-size: 13px; color:#c9aa76; margin-top: 10px; text-align: center;">✦ 交换相邻方块 ✦<br>累积消除100块方块即可获胜</div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------------- 古墓消消乐核心配置 ----------------
        const ROWS = 11;
        const COLS = 12;
        const CELL_W = 90;
        const CELL_H = 90;

        // 动画常量
        const ELIMINATE_DELAY = 500;  // 消除高亮时长 0.5秒
        const FALL_DURATION = 500;    // 下落动画时长 0.5秒

        // 动画阶段
        const ANIM_PHASE = {
            IDLE: 0,
            HIGHLIGHT: 1,
            FALLING: 2
        };

        // 方块类型（6种）
        const TYPE_SOIL   = 0; // 泥土
        const TYPE_STONE  = 1; // 碎石
        const TYPE_SHARD  = 2; // 残片
        const TYPE_DUST   = 3; // 灰尘
        const TYPE_BRICK  = 4; // 砖块
        const TYPE_TRASH  = 5; // 垃圾

        // 类型显示符号&颜色风格
        const TYPE_INFO = {
            [TYPE_SOIL]:   { icon: "⛰️", name:"泥土",  color1:"#8b5a2b", color2:"#c28a3e", accent:"#4e2a13", text:"土" },
            [TYPE_STONE]:  { icon: "🪨", name:"碎石",  color1:"#6c6f6a", color2:"#9a9c93", accent:"#2c2b26", text:"石" },
            [TYPE_SHARD]:  { icon: "🥏", name:"残片",  color1:"#6b7c8a", color2:"#4a5d6e", accent:"#2a3a4a", text:"片" },
            [TYPE_DUST]:   { icon: "💨", name:"灰尘",  color1:"#b0a090", color2:"#8a7a6a", accent:"#5a4a3a", text:"尘" },
            [TYPE_BRICK]:  { icon: "🧱", name:"砖块",  color1:"#a05040", color2:"#7a3525", accent:"#4a2010", text:"砖" },
            [TYPE_TRASH]:  { icon: "🗑️", name:"垃圾",  color1:"#5a6a4a", color2:"#3a4a2a", accent:"#1a2a0a", text:"圾" }
        };

        let gameGrid = [];
        let selectedRow = -1, selectedCol = -1;
        let currentSoilPercent = 100;
        let totalEliminated = 0;
        let isProcessing = false;
        let gameActive = true;

        // 动画状态
        let currentAnimPhase = ANIM_PHASE.IDLE;
        let eliminatingBlocks = [];
        let fallingBlocks = [];
        let animationFrameId = null;

        // DOM 元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const soilFillDiv = document.getElementById('soilFill');
        const soilPercentSpan = document.getElementById('soilPercent');

        // 辅助函数: 更新UI进度条 (由 totalEliminated 驱动)
        function updateSoilUI() {
            let percent = Math.max(0, Math.min(100, 100 - totalEliminated));
            soilFillDiv.style.height = percent + "%";
            soilPercentSpan.innerText = Math.floor(percent) + "%";
        }

        // 随机生成新块 (6种平均分布，每种约16.7%)
        function getRandomBlockType() {
            return Math.floor(Math.random() * 6);
        }

        // 初始化/重置网格
        function generateRandomGrid() {
            let grid = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            for(let i=0; i<ROWS; i++) {
                for(let j=0; j<COLS; j++) {
                    grid[i][j] = getRandomBlockType();
                }
            }
            return grid;
        }

        // ---------- 核心匹配检测 ----------
        function getAllMatches(grid) {
            const matches = new Set();
            // 水平匹配
            for(let i=0; i<ROWS; i++) {
                let len = 1;
                for(let j=1; j<=COLS; j++) {
                    if(j<COLS && grid[i][j] === grid[i][j-1] && grid[i][j] !== undefined && grid[i][j] >= 0) {
                        len++;
                    } else {
                        if(len >= 3) {
                            for(let k=j-len; k<j; k++) {
                                matches.add(`${i},${k}`);
                            }
                        }
                        len = 1;
                    }
                }
            }
            // 垂直匹配
            for(let j=0; j<COLS; j++) {
                let len = 1;
                for(let i=1; i<=ROWS; i++) {
                    if(i<ROWS && grid[i][j] === grid[i-1][j] && grid[i][j] !== undefined && grid[i][j] >= 0) {
                        len++;
                    } else {
                        if(len >= 3) {
                            for(let k=i-len; k<i; k++) {
                                matches.add(`${k},${j}`);
                            }
                        }
                        len = 1;
                    }
                }
            }
            return Array.from(matches).map(coord => {
                let [r,c] = coord.split(',').map(Number);
                return {row:r, col:c};
            });
        }

        // 稳定网格 (递归消除但不扣除土层进度,用于初始化和重置) - 同步版本
        function stabilizeGridWithoutProgress(grid) {
            let anyMatch = true;
            let maxLoop = 200;
            let loopGuard = 0;
            while(anyMatch && loopGuard++ < maxLoop) {
                let matches = getAllMatches(grid);
                if(matches.length === 0) break;
                for(let m of matches) {
                    grid[m.row][m.col] = -1;
                }
                for(let c=0; c<COLS; c++) {
                    let columnVals = [];
                    for(let r=ROWS-1; r>=0; r--) {
                        if(grid[r][c] !== -1 && grid[r][c] !== undefined) {
                            columnVals.unshift(grid[r][c]);
                        }
                    }
                    let missing = ROWS - columnVals.length;
                    for(let i=0; i<missing; i++) columnVals.unshift(getRandomBlockType());
                    for(let r=0; r<ROWS; r++) grid[r][c] = columnVals[r];
                }
            }
        }

        // 延迟函数
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 准备下落动画数据（重力下落版本 - 预先计算目标位置）
        function prepareFallAnimation(matches) {
            let blocks = [];
            let affectedCols = [...new Set(matches.map(m => m.col))];

            for(let c of affectedCols) {
                let eliminatedRows = matches.filter(m => m.col === c).map(m => m.row);
                eliminatedRows.sort((a,b) => a-b);
                let minEliminatedRow = eliminatedRows[0];
                let eliminatedCount = eliminatedRows.length;

                // 步骤1：收集被消除位置上方的所有方块（包括有方块和没方块的行）
                let aboveCells = [];
                for(let r = 0; r < minEliminatedRow; r++) {
                    aboveCells.push({
                        type: gameGrid[r][c],
                        startRow: r
                    });
                }

                // 步骤2：计算这些方块下落后的目标位置
                // 从被消除位置的最底部开始，往上填补
                let targetPositions = [];
                let writeRow = minEliminatedRow + eliminatedCount - 1; // 最下面的被消除行
                
                // 从下往上遍历上方的方块
                for(let i = aboveCells.length - 1; i >= 0; i--) {
                    let cell = aboveCells[i];
                    if(cell.type >= 0) {
                        // 有方块，它下落到 writeRow
                        targetPositions.unshift({
                            type: cell.type,
                            startRow: cell.startRow,
                            targetRow: writeRow
                        });
                        writeRow--;
                    }
                    // 如果是空的，writeRow 不变，相当于空隙被消除了
                }

                // 步骤3：新方块填补剩余的空位（顶部）
                let newBlockCount = eliminatedCount;
                // 但如果上方有空隙，实际下落距离可能不同
                // 新方块从上方生成，数量等于消除数量
                for(let i = 0; i < newBlockCount; i++) {
                    targetPositions.unshift({
                        type: getRandomBlockType(),
                        startRow: -(newBlockCount - i),  // 在画布上方
                        targetRow: writeRow
                    });
                    writeRow--;
                }

                // 步骤4：创建动画方块（只添加位置会改变的）
                for(let pos of targetPositions) {
                    if(pos.startRow !== pos.targetRow) {
                        blocks.push({
                            col: c,
                            type: pos.type,
                            startRow: pos.startRow,
                            targetRow: pos.targetRow,
                            currentRow: pos.startRow,
                            currentY: pos.startRow * CELL_H,
                            velocity: 0,
                            stopped: false
                        });
                    }
                }
            }

            return blocks;
        }

        // 执行下落动画（物理重力版本）
        function runFallAnimation() {
            return new Promise(resolve => {
                const GRAVITY = 2.0;
                const MAX_SPEED = 25;

                function step() {
                    let allStopped = true;

                    // 按从下到上顺序处理（下方方块先停止）
                    let sortedBlocks = [...fallingBlocks].sort((a, b) => b.currentRow - a.currentRow);

                    for(let block of sortedBlocks) {
                        if(block.stopped) continue;

                        // 应用重力
                        block.velocity = Math.min(block.velocity + GRAVITY, MAX_SPEED);
                        block.currentY += block.velocity;

                        // 计算当前逻辑行
                        let logicalRow = Math.floor(block.currentY / CELL_H);

                        // 检查是否到达或超过目标行
                        if(logicalRow >= block.targetRow) {
                            block.currentY = block.targetRow * CELL_H;
                            block.currentRow = block.targetRow;
                            block.stopped = true;
                            continue;
                        }

                        // 检查下一行是否有已停止的方块（同列）
                        let nextRow = logicalRow + 1;
                        let blocked = false;

                        // 检查 gameGrid 中是否有固定方块
                        if(nextRow <= block.targetRow && gameGrid[nextRow][block.col] >= 0) {
                            blocked = true;
                        }

                        // 检查其他已停止的下落方块
                        if(!blocked) {
                            for(let other of fallingBlocks) {
                                if(other !== block && other.stopped && other.col === block.col) {
                                    if(other.currentRow === nextRow) {
                                        blocked = true;
                                        break;
                                    }
                                }
                            }
                        }

                        if(blocked) {
                            // 停在当前行
                            block.currentY = logicalRow * CELL_H;
                            block.currentRow = logicalRow;
                            block.stopped = true;
                        } else {
                            block.currentRow = logicalRow;
                            allStopped = false;
                        }
                    }

                    drawCanvas();

                    if(!allStopped) {
                        animationFrameId = requestAnimationFrame(step);
                    } else {
                        resolve();
                    }
                }

                animationFrameId = requestAnimationFrame(step);
            });
        }

        // 动画完成后更新网格
        function updateGridAfterFall() {
            // 清除所有下落方块的起始位置（原始位置）
            for(let block of fallingBlocks) {
                if(block.startRow >= 0 && block.startRow < ROWS) {
                    gameGrid[block.startRow][block.col] = -1;
                }
            }
            // 设置最终位置
            for(let block of fallingBlocks) {
                gameGrid[block.currentRow][block.col] = block.type;
            }
        }

        // 执行一次消除动画
        async function performEliminationAnimation(matches) {
            // 阶段1：高亮显示0.5秒
            currentAnimPhase = ANIM_PHASE.HIGHLIGHT;
            eliminatingBlocks = matches;
            drawCanvas();

            await delay(ELIMINATE_DELAY);

            // 阶段2：从网格中移除匹配的方块
            for(let m of matches) {
                gameGrid[m.row][m.col] = -1;
            }

            // 计算下落动画
            fallingBlocks = prepareFallAnimation(matches);

            // 清除下落方块在网格中的原始位置（避免碰撞检测时阻挡自己）
            for(let block of fallingBlocks) {
                if(block.startRow >= 0 && block.startRow < ROWS) {
                    gameGrid[block.startRow][block.col] = -1;
                }
            }

            // 阶段3：执行下落动画
            currentAnimPhase = ANIM_PHASE.FALLING;
            eliminatingBlocks = [];

            await runFallAnimation();

            // 动画完成后更新网格
            updateGridAfterFall();

            currentAnimPhase = ANIM_PHASE.IDLE;
            fallingBlocks = [];
            drawCanvas();
        }

        // 核心递归消除+土层扣除 (带动画)
        async function resolveMatchesAndDrop(updateProgress = true) {
            let anyAction = false;
            let maxLoop = 150;
            let loopSafe = 0;

            while(loopSafe++ < maxLoop) {
                let matches = getAllMatches(gameGrid);
                if(matches.length === 0) break;

                anyAction = true;
                let matchCount = matches.length;

                // 扣除土层进度
                if(updateProgress && matchCount > 0) {
                    totalEliminated += matchCount;
                    currentSoilPercent = Math.max(0, 100 - totalEliminated);
                    updateSoilUI();
                    if(totalEliminated >= 100) {
                        await performEliminationAnimation(matches);
                        winGame();
                        return true;
                    }
                }

                // 执行消除动画
                await performEliminationAnimation(matches);
            }

            return anyAction;
        }

        // 重置完整游戏状态
        function resetFullGame(showMsg = false) {
            // 取消任何正在进行的动画
            if(animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            selectedRow = -1;
            selectedCol = -1;
            currentSoilPercent = 100;
            totalEliminated = 0;
            gameActive = true;
            isProcessing = false;
            currentAnimPhase = ANIM_PHASE.IDLE;
            eliminatingBlocks = [];
            fallingBlocks = [];
            updateSoilUI();

            let newGrid = generateRandomGrid();
            stabilizeGridWithoutProgress(newGrid);
            gameGrid = newGrid;
            drawCanvas();

            if(showMsg) showToast("🪦 墓穴已重置，继续挖掘...");
        }

        // 胜利行为
        function winGame() {
            if(!gameActive) return;
            gameActive = false;
            showToast("✨ 圣物出土！消除100块方块，获得【古代祭祀罐】 ✨");
            setTimeout(() => {
                resetFullGame(true);
            }, 800);
        }

        // 尝试交换两个格子
        async function trySwapAndMatch(r1,c1, r2,c2) {
            if(r1===r2 && c1===c2) return false;
            if(r1<0||r1>=ROWS||c1<0||c1>=COLS||r2<0||r2>=ROWS||c2<0||c2>=COLS) return false;

            // 交换
            let temp = gameGrid[r1][c1];
            gameGrid[r1][c1] = gameGrid[r2][c2];
            gameGrid[r2][c2] = temp;

            // 检查是否有匹配
            let matches = getAllMatches(gameGrid);
            if(matches.length > 0) {
                await resolveMatchesAndDrop(true);
                return true;
            } else {
                // 无效交换，换回来
                temp = gameGrid[r1][c1];
                gameGrid[r1][c1] = gameGrid[r2][c2];
                gameGrid[r2][c2] = temp;
                return false;
            }
        }

        // 绘制单个方块
        function drawBlockAt(x, y, type, isHighlight = false) {
            let info = TYPE_INFO[type];
            let grad = ctx.createLinearGradient(x, y, x+CELL_W, y+CELL_H);
            if(isHighlight) {
                grad.addColorStop(0, lightenColor(info.color1, 20));
                grad.addColorStop(1, lightenColor(info.color2, 20));
            } else {
                grad.addColorStop(0, info.color1);
                grad.addColorStop(1, info.color2);
            }
            ctx.fillStyle = grad;
            ctx.fillRect(x, y, CELL_W-1, CELL_H-1);

            // 浮雕边
            ctx.strokeStyle = "#3a2a1a";
            ctx.lineWidth = 1;
            ctx.strokeRect(x+0.5, y+0.5, CELL_W-2, CELL_H-2);

            // 绘制图标
            ctx.font = `${CELL_W * 0.5}px "Segoe UI Emoji"`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = isHighlight ? lightenColor(info.accent, 20) : info.accent;
            ctx.fillText(info.icon, x+CELL_W/2, y+CELL_H/2-5);
            ctx.fillStyle = isHighlight ? "#fff5c4" : "#ead5a3";
            ctx.font = `${CELL_W * 0.28}px monospace`;
            ctx.fillText(info.text, x+CELL_W/2, y+CELL_H/2+15);

            // 高亮边框
            if(isHighlight) {
                ctx.strokeStyle = "#f7d44a";
                ctx.lineWidth = 3;
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#ffbf40";
                ctx.strokeRect(x+2, y+2, CELL_W-5, CELL_H-5);
                ctx.shadowBlur = 0;
            }
        }

        // 颜色提亮辅助函数
        function lightenColor(hex, percent) {
            let r = parseInt(hex.substring(1,3), 16);
            let g = parseInt(hex.substring(3,5), 16);
            let b = parseInt(hex.substring(5,7), 16);
            r = Math.min(255, Math.floor(r * (1 + percent/100)));
            g = Math.min(255, Math.floor(g * (1 + percent/100)));
            b = Math.min(255, Math.floor(b * (1 + percent/100)));
            return `rgb(${r},${g},${b})`;
        }

        // ---------- 绘制古墓风格画布 ----------
        function drawCanvas() {
            if(!ctx) return;

            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景
            ctx.fillStyle = "#201608";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 构建正在下落的方块的起始位置集合
            let fallingStartSet = new Set();
            if(currentAnimPhase === ANIM_PHASE.FALLING) {
                for(let block of fallingBlocks) {
                    if(block.startRow >= 0) {
                        fallingStartSet.add(`${block.startRow},${block.col}`);
                    }
                }
            }

            // 绘制网格
            for(let i=0; i<ROWS; i++) {
                for(let j=0; j<COLS; j++) {
                    let x = j * CELL_W;
                    let y = i * CELL_H;
                    let type = gameGrid[i][j];

                    // 判断当前位置是否被某个下落方块占据
                    let isFallingStart = currentAnimPhase === ANIM_PHASE.FALLING &&
                        fallingStartSet.has(`${i},${j}`);

                    if(isFallingStart) {
                        // 该位置的方块正在别处下落，显示空背景
                        ctx.fillStyle = "#1a1008";
                        ctx.fillRect(x, y, CELL_W-1, CELL_H-1);
                        ctx.strokeStyle = "#3a2a1a";
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x+0.5, y+0.5, CELL_W-2, CELL_H-2);
                    } else if(currentAnimPhase === ANIM_PHASE.HIGHLIGHT) {
                        // 高亮阶段
                        if(type >= 0) {
                            let isHighlight = eliminatingBlocks.some(b => b.row === i && b.col === j);
                            drawBlockAt(x, y, type, isHighlight);
                        } else {
                            // 空格子
                            ctx.fillStyle = "#1a1008";
                            ctx.fillRect(x, y, CELL_W-1, CELL_H-1);
                            ctx.strokeStyle = "#3a2a1a";
                            ctx.lineWidth = 1;
                            ctx.strokeRect(x+0.5, y+0.5, CELL_W-2, CELL_H-2);
                        }
                    } else {
                        // 正常阶段或下落阶段（非下落原始位置）
                        if(type >= 0) {
                            drawBlockAt(x, y, type, false);
                        } else {
                            // 空格子
                            ctx.fillStyle = "#1a1008";
                            ctx.fillRect(x, y, CELL_W-1, CELL_H-1);
                            ctx.strokeStyle = "#3a2a1a";
                            ctx.lineWidth = 1;
                            ctx.strokeRect(x+0.5, y+0.5, CELL_W-2, CELL_H-2);
                        }
                    }
                }
            }

            // 下落阶段绘制下落方块
            if(currentAnimPhase === ANIM_PHASE.FALLING) {
                for(let block of fallingBlocks) {
                    let x = block.col * CELL_W;
                    let y = block.currentY;
                    drawBlockAt(x, y, block.type, false);
                }
            }

            // 高亮选中的格子（在非下落阶段）
            if(currentAnimPhase !== ANIM_PHASE.FALLING && selectedRow >= 0 && selectedCol >= 0) {
                let x = selectedCol * CELL_W;
                let y = selectedRow * CELL_H;
                ctx.strokeStyle = "#f7d44a";
                ctx.lineWidth = 4;
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#ffbf40";
                ctx.strokeRect(x+2, y+2, CELL_W-5, CELL_H-5);
                ctx.shadowBlur = 0;
            }

            // 装饰符文
            ctx.font = "bold 18px 'Cinema'";
            ctx.fillStyle = "#ebc27a66";
            ctx.fillText("⚰️ 尘封咒阵 ⚰️", 20, 35);
        }

        // 显示toast
        let toastTimeout = null;
        function showToast(msg) {
            let oldToast = document.querySelector('.toast-msg');
            if(oldToast) oldToast.remove();
            let div = document.createElement('div');
            div.className = 'toast-msg';
            div.innerText = msg;
            document.body.appendChild(div);
            if(toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { if(div) div.remove(); }, 1800);
        }

        // 处理玩家点击canvas交换逻辑
        async function handleCanvasClick(e) {
            if(isProcessing || !gameActive) {
                if(!gameActive) showToast("古墓震荡，稍后再试...");
                return;
            }

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            if(mouseX<0 || mouseY<0 || mouseX>canvas.width || mouseY>canvas.height) return;
            let col = Math.floor(mouseX / CELL_W);
            let row = Math.floor(mouseY / CELL_H);
            if(row<0 || row>=ROWS || col<0 || col>=COLS) return;

            // 没有选中任何格子 => 选中当前
            if(selectedRow === -1 && selectedCol === -1) {
                selectedRow = row;
                selectedCol = col;
                drawCanvas();
                return;
            }

            // 已有选中的格子，尝试交换
            let sRow = selectedRow, sCol = selectedCol;
            let isAdjacent = (Math.abs(sRow - row) + Math.abs(sCol - col)) === 1;
            if(!isAdjacent) {
                selectedRow = row;
                selectedCol = col;
                drawCanvas();
                return;
            }

            // 尝试交换
            isProcessing = true;
            let success = await trySwapAndMatch(sRow, sCol, row, col);
            selectedRow = -1;
            selectedCol = -1;
            drawCanvas();

            if(!success) {
                showToast("❌ 此地无宝，无法匹配... ❌");
            } else {
                if(!gameActive) {
                    isProcessing = false;
                    return;
                }
                if(totalEliminated >= 100) {
                    isProcessing = false;
                    return;
                }
            }
            isProcessing = false;

            // 检查累积消除是否达到100（二次保险）
            if(totalEliminated >= 100 && gameActive) {
                winGame();
            }
        }

        // 重置按钮逻辑
        function onReset() {
            if(isProcessing) return;
            resetFullGame(true);
            drawCanvas();
        }

        // 退出按钮
        function onExit() {
            if(isProcessing) return;
            resetFullGame(true);
            showToast("⛏️ 离开了墓室，没有带回文物... ⛏️");
        }

        // 初始化游戏
        function initGame() {
            let initGrid = generateRandomGrid();
            stabilizeGridWithoutProgress(initGrid);
            gameGrid = initGrid;
            currentSoilPercent = 100;
            totalEliminated = 0;
            gameActive = true;
            updateSoilUI();
            drawCanvas();
            // 绑定事件
            canvas.addEventListener('click', handleCanvasClick);
            document.getElementById('resetBtn').addEventListener('click', onReset);
            document.getElementById('exitBtn').addEventListener('click', onExit);
        }

        initGame();
    })();
</script>
